name: prefab_flutter
description: Code generator for Prefab Flutter — generates CRUD screens, Riverpod providers, API clients, and go_router routes from annotated model classes.
version: 0.1.0
homepage: https://github.com/stijnvanbael/prefab

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  build: ^2.4.0
  source_gen: ^1.5.0
  analyzer: ^6.0.0
  prefab_flutter_annotations:
    path: ../prefab_flutter_annotations

dev_dependencies:
  build_runner: ^2.4.0
  test: ^1.24.0
  build_test: ^2.2.0
