name: prefab_flutter_example
description: Example Flutter app demonstrating Prefab Flutter code generation.
version: 1.0.0

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.16.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.4.0
  riverpod_annotation: ^2.3.0
  go_router: ^14.0.0
  dio: ^5.4.0
  json_annotation: ^4.8.0
  prefab_flutter_annotations:
    path: ../prefab_flutter_annotations

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.0
  riverpod_generator: ^2.3.0
  go_router_builder: ^2.4.0
  json_serializable: ^6.7.0
  prefab_flutter:
    path: ../prefab_flutter

flutter:
  uses-material-design: true
