spring:
  flyway:
    clean-disabled: false
  kafka:
    producer:
      properties:
        max.block.ms: 1000
        request.timeout.ms: 1000
        delivery.timeout.ms: 2000

logging.level:
  be.appify.prefab.example: DEBUG

prefab:
  dlt:
    retries:
      limit: 1
      initial-interval-ms: 10
  outbox:
    poll-interval-ms: 500
    batch-size: 10